<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartBlog Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f5fbff',
                100: '#e7f5ff',
                200: '#cfe6ff',
                300: '#9fccff',
                400: '#61a7ff',
                500: '#2f84ff',
                600: '#246bd7',
                700: '#1d55b0',
                800: '#19478f',
                900: '#163d7a'
              }
            }
          }
        }
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 selection:bg-brand-300 selection:text-slate-900">
    <div class="mx-auto max-w-7xl px-6 py-8 sm:px-8">
      <header class="mb-10 flex flex-wrap items-center justify-between gap-4 rounded-[2rem] bg-white p-6 shadow-sm">
        <a href="index.html" class="inline-flex items-center gap-3 text-brand-700">
          <span class="inline-flex h-12 w-12 items-center justify-center rounded-3xl bg-brand-100 text-2xl font-bold">S</span>
          <span class="text-lg font-semibold">SmartBlog</span>
        </a>
        <div class="flex flex-wrap gap-3 text-sm font-medium text-slate-600">
          <a href="login.html" class="rounded-full bg-brand-600 px-5 py-2 text-white shadow-sm transition hover:bg-brand-700">Login</a>
          <a href="register.html" class="rounded-full border border-slate-200 bg-white px-5 py-2 text-slate-700 transition hover:border-brand-300 hover:text-brand-700">Register</a>
          <a href="user-dashboard.html" class="rounded-full border border-transparent bg-slate-100 px-5 py-2 text-slate-700 transition hover:bg-slate-200">User Dashboard</a>
          <a href="admin-dashboard.html" class="rounded-full border border-transparent bg-slate-100 px-5 py-2 text-slate-700 transition hover:bg-slate-200">Admin Dashboard</a>
        </div>
      </header>

      <div class="grid gap-10 lg:grid-cols-[1.1fr_0.9fr]">
        <div class="rounded-[2rem] bg-white p-10 shadow-sm sm:p-14">
          <p class="text-sm uppercase tracking-[0.24em] text-brand-600">Welcome back</p>
          <h1 class="mt-4 text-3xl font-semibold text-slate-900 sm:text-4xl">Login to your SmartBlog account</h1>
          <p class="mt-4 max-w-2xl text-sm leading-7 text-slate-600">Access drafts, manage your posts, and review editorial requests with a secure account experience.</p>
          <div class="mt-10 space-y-6">
            <div class="rounded-3xl bg-slate-50 p-6">
              <p class="text-sm font-semibold uppercase tracking-[0.24em] text-slate-500">Mock login credentials</p>
              <p class="mt-3 text-sm text-slate-600">Email: <span class="font-medium text-slate-900">writer@smartblog.com</span></p>
              <p class="text-sm text-slate-600">Password: <span class="font-medium text-slate-900">SmartBlog123</span></p>
            </div>
          </div>
        </div>

        <div class="rounded-[2rem] bg-white p-10 shadow-sm sm:p-14">
          <form class="space-y-6">
            <div>
              <label class="text-sm font-semibold text-slate-900" for="email">Email address</label>
              <input id="email" type="email" placeholder="you@example.com" class="mt-3 w-full rounded-3xl border border-slate-200 bg-slate-50 px-5 py-3 text-sm text-slate-900 outline-none transition focus:border-brand-300 focus:ring-2 focus:ring-brand-100" />
            </div>
            <div>
              <label class="text-sm font-semibold text-slate-900" for="password">Password</label>
              <input id="password" type="password" placeholder="Enter your password" class="mt-3 w-full rounded-3xl border border-slate-200 bg-slate-50 px-5 py-3 text-sm text-slate-900 outline-none transition focus:border-brand-300 focus:ring-2 focus:ring-brand-100" />
            </div>
            <div class="flex items-center justify-between text-sm text-slate-600">
              <label class="inline-flex items-center gap-3">
                <input type="checkbox" class="h-4 w-4 rounded border-slate-300 text-brand-600 focus:ring-brand-500" />
                Remember me
              </label>
              <a href="register.html" class="font-semibold text-brand-700 transition hover:text-brand-900">Create an account</a>
            </div>
            <button type="submit" class="w-full rounded-full bg-brand-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-brand-700">Login</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
